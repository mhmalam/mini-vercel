services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minivercel
      POSTGRES_PASSWORD: minivercel
      POSTGRES_DB: minivercel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minivercel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: mini-vercel-nginx
    restart: unless-stopped
    ports:
      # Local dev: http only, on 8080. The VPS override maps 80/443 instead.
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    extra_hosts:
      # Lets nginx reach app containers published on the host's loopback.
      # Works on Docker Desktop out of the box; host-gateway covers Linux VPS.
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  redisdata:
