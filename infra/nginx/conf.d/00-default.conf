# Catch-all for unknown/offline subdomains. Per-project routes are generated
# by the worker as 10-<project>.conf files next to this one; never edit those
# by hand. The branded page lives in ../branding (mounted read-only).
server {
    listen 80 default_server;
    server_name _;

    error_page 404 /__mv_offline.html;
    location = /__mv_offline.html {
        internal;
        alias /etc/nginx/branding/offline.html;
    }
    location / {
        return 404;
    }
}
