# The platform's own services, routed by hostname like any deployed app.
# Locally: http://dashboard.localhost:8080 and http://api.localhost:8080
# VPS:     https://deploy.malam.me (dashboard) and https://api.deploy.malam.me

server {
    listen 80;
    server_name deploy.malam.me dashboard.localhost;

    location / {
        proxy_pass http://host.docker.internal:3001;
        # $http_host keeps the port (dashboard.localhost:8080) — Next.js
        # server actions reject the request if Host doesn't match Origin.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.deploy.malam.me api.localhost;

    location / {
        proxy_pass http://host.docker.internal:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # build-log streaming (WebSocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }
}
