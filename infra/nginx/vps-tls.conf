# VPS-only (mounted as conf.d/99-tls.conf by docker-compose.vps.yml).
# Terminates TLS for the whole wildcard with the one Let's Encrypt cert, then
# hands the request back to this same nginx over plain HTTP on 127.0.0.1:80,
# where the per-project server blocks (10-*.conf) route by Host header.
# Local dev never loads this file, so local and VPS routing stay identical.

server {
    listen 443 ssl default_server;
    http2 on;
    server_name malam.me *.malam.me *.deploy.malam.me;

    ssl_certificate     /etc/nginx/certs/deploy.malam.me.pem;
    ssl_certificate_key /etc/nginx/certs/deploy.malam.me.key;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }
}

# Note: plain-HTTP requests still hit the per-project blocks directly (nginx
# prefers their exact server_name over any wildcard redirect we could add
# here). v1 accepts HTTP-or-HTTPS; forcing a redirect means moving project
# blocks to an internal-only port first — backlog polish, not needed for MVP.
